syntax = "proto2";
package tzrec.protos;

import "tzrec/protos/module.proto";
import "tzrec/protos/tower.proto";


message WideAndDeep {
    required MLP deep = 1;
    optional MLP final = 2;
    optional uint32 wide_embedding_dim = 3 [default = 4];
    // wide embedding init function, e.g. "nn.init.uniform_,a=-0.01,b=0.01"
    optional string wide_init_fn = 4;
}

message DeepFM {
    required MLP deep = 1;
    optional MLP final = 2;
    optional uint32 wide_embedding_dim = 3 [default = 4];
    // wide embedding init function, e.g. "nn.init.uniform_,a=-0.01,b=0.01"
    optional string wide_init_fn = 4;
}

message MultiTower {
    repeated Tower towers = 1;
    required MLP final = 2;
}

message MultiTowerDIN {
    repeated Tower towers = 1;
    repeated DINTower din_towers = 2;
    required MLP final = 3;
}


message DLRM {
  // if has dense feature group,must has dense_mlp
  optional MLP dense_mlp = 1;
  // whether to include sparse features after interaction
  optional bool arch_with_sparse = 2 [default=true];
  required MLP final = 3;
}


message MaskNet {
    required MaskNetModule mask_net_module = 1;
}


message DCNV1 {
    required Cross cross = 1;
    required MLP deep = 2;
    required MLP final = 3;
}


message DCNV2 {
    optional MLP backbone = 1;
    required CrossV2 cross = 2;
    optional MLP deep = 3;
    required MLP final = 4;
}


message xDeepFM {
    required CIN cin = 1;
    required MLP deep = 2;
    required MLP final = 3;
    optional uint32 wide_embedding_dim = 4 [default = 16];
    // wide embedding init function, e.g. "nn.init.uniform_,a=-0.01,b=0.01"
    optional string wide_init_fn = 5;
}


message xDeepFM2 {
    required CIN cin = 1;
    required MLP deep = 2;
    required MLP final = 3;
    optional uint32 wide_embedding_dim = 4 [default = 16];
    // wide embedding init function, e.g. "nn.init.uniform_,a=-0.01,b=0.01"
    optional string wide_init_fn = 5;
    optional RawDenseReducer raw_dense_reducer = 6;
}


message WuKong {
    optional MLP dense_mlp = 1;
    repeated WuKongLayer wukong_layers = 2;
    required MLP final = 3;
}


message WuKongDIN {
    optional MLP dense_mlp = 1;
    repeated WuKongLayer wukong_layers = 2;
    required MLP final = 3;
}


message DCNV3 {
    optional MLP backbone = 1;
    required CrossV2 cross = 2;
    optional MLP deep = 3;
    required MLP final = 4;
    optional MLP din = 5;
    optional MLP din_encoder = 6;
    optional uint32 max_seq_length = 7 [default = 0];
    optional MLP bias = 8;
}


message DCNV4 {
    optional MLP backbone = 1;
    required CrossV2 cross = 2;
    optional MLP deep = 3;
    required MLP final = 4;
}


message EmbeddingSplitConfig {
    required string group_a = 1;
    required string group_b = 2;
    repeated string shared_features = 3;
    repeated string shared_sequence_groups = 4;
}

message ThreeTowerDCN {
    optional MLP backbone = 1;
    required CrossV2 cross = 2;
    optional MLP deep = 3;
    required MLP final = 4;
    optional MLP din = 5;
    optional MLP din_encoder = 6;
    optional uint32 max_seq_length = 7 [default = 0];
    optional MLP bias = 8;
    repeated EmbeddingSplitConfig embedding_split = 9;
    optional MLP din_encoder_main = 10;
    optional MLP din_main = 11;
}

message CDOT {
    required uint32 output_dim = 1;
    optional uint32 mid_dim = 2 [default = 32];
    repeated uint32 compress_hidden_units = 3;
}

message VectorProjection {
    required string feature_name = 1;
    required uint32 target_dim = 2;
}

message TowerConfig {
    required string tower_name = 1;
    required uint32 dim_size = 2;
    repeated string feature_names = 3;
    repeated string sequence_groups = 4;
    repeated VectorProjection vector_projections = 5;
    optional MLP din_encoder = 6;
    optional MLP din = 7;
}

message VolcanoRank {
    required MLP deep = 2;
    required CDOT cdot = 3;
    optional MLP bias = 4;
    optional uint32 max_seq_length = 5 [default = 0];
    optional MLP lhuc_gate = 6;
    optional bool use_lhuc = 7 [default = false];
    optional MLP final = 8;
}
